services:
  citare:
    build: .
    image: bwthomas/citare-service:${CITARE_VERSION:-latest}
    environment:
      CITARE_SERVICE_AUTH: ${CITARE_SERVICE_AUTH:?set CITARE_SERVICE_AUTH to a 16+ char secret}
      CITARE_USER_AGENT: "citare-service/0.1.0 (+https://github.com/bwthomas/citare-service)"
      LOG_LEVEL: ${CITARE_LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      # Uncomment to enable the LLM fallback strategy:
      # CITARE_LLM_ANTHROPIC_API_KEY: ${CITARE_LLM_ANTHROPIC_API_KEY}
      # CITARE_LLM_ANTHROPIC_MODEL: ${CITARE_LLM_ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      # Uncomment to route URL extractions through a self-hosted Zotero
      # translation-server sidecar (also uncomment the service below).
      # CITARE_TRANSLATION_SERVER_URL: http://translation-server:1969
    ports:
      - "${CITARE_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Optional: self-hosted Zotero translation-server sidecar. Uncomment (and
  # the CITARE_TRANSLATION_SERVER_URL env var on `citare` above) to enable.
  # Image is unmodified upstream — AGPL §13 obligations do not apply to
  # citare-service because we communicate over HTTP and do not redistribute
  # the translation-server image itself. Source is at
  # https://github.com/zotero/translation-server.
  # translation-server:
  #   image: zotero/translation-server:latest
  #   ports:
  #     - "${TRANSLATION_SERVER_HOST_PORT:-1969}:1969"
  #   restart: unless-stopped
